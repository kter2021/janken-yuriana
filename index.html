<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <title>Unity Web Player | yakyuuken</title>

  <meta property="og:title" content="yakyuuken">
  <meta property="og:description" content="Unofficial fan-made WebGL game">
  <meta property="og:image" content="thumbnail.png">

  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
</head>

<body style="margin:0; background:black;">

  <div id="unity-container" class="unity-desktop">

    <canvas id="unity-canvas"
            width="1080"
            height="1920"
            tabindex="-1"></canvas>

    <div id="unity-loading-bar">

      <div id="unity-logo"></div>

      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>

    </div>

    <div id="unity-warning"></div>

    <div id="unity-footer">

      <div id="unity-logo-title-footer"></div>

      <div id="unity-build-title">
        yakyuuken
      </div>

    </div>

  </div>

  <script>

    var canvas = document.querySelector("#unity-canvas");

    function unityShowBanner(msg, type) {

      var warningBanner = document.querySelector("#unity-warning");

      function updateBannerVisibility() {

        warningBanner.style.display =
          warningBanner.children.length ? 'block' : 'none';
      }

      var div = document.createElement('div');

      div.innerHTML = msg;

      warningBanner.appendChild(div);

      if (type == 'error') {

        div.style = 'background:red; padding:10px;';

      } else {

        if (type == 'warning') {

          div.style = 'background:yellow; padding:10px;';
        }

        setTimeout(function () {

          warningBanner.removeChild(div);

          updateBannerVisibility();

        }, 5000);
      }

      updateBannerVisibility();
    }

    var buildUrl = "Build";

    var loaderUrl = buildUrl + "/janken-yuriana.loader.js";

    var config = {

      arguments: [],

      dataUrl: buildUrl + "/janken-yuriana.data.unityweb",

      frameworkUrl: buildUrl + "/janken-yuriana.framework.js.unityweb",

      codeUrl: buildUrl + "/janken-yuriana.wasm.unityweb",

      streamingAssetsUrl: "StreamingAssets",

      companyName: "DefaultCompany",

      productName: "yakyuuken",

      productVersion: "1.0",

      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

      var meta = document.createElement('meta');

      meta.name = 'viewport';

      meta.content =
        'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';

      document.getElementsByTagName('head')[0].appendChild(meta);

      document.querySelector("#unity-container").className = "unity-mobile";

      canvas.className = "unity-mobile";

    } else {

      const appWidth = 1080;
      const appHeight = 1920;

      function resizeGame() {

        const winWidth = window.innerWidth;
        const winHeight = window.innerHeight;

        const scale = Math.min(
          winWidth / appWidth,
          winHeight / appHeight
        );

        canvas.style.width = (appWidth * scale) + "px";
        canvas.style.height = (appHeight * scale) + "px";
      }

      window.addEventListener('resize', resizeGame);

      resizeGame();
    }

    document.querySelector("#unity-loading-bar").style.display = "block";

    var script = document.createElement("script");

    script.src = loaderUrl;

    script.onload = () => {

      createUnityInstance(canvas, config, (progress) => {

        document.querySelector("#unity-progress-bar-full").style.width =
          100 * progress + "%";

      }).then((unityInstance) => {

        document.querySelector("#unity-loading-bar").style.display = "none";

      }).catch((message) => {

        alert(message);

      });
    };

    document.body.appendChild(script);

  </script>

  <div style="
    margin-top:8px;
    margin-bottom:8px;
    text-align:center;
    font-size:12px;
    color:#888;
    font-family:sans-serif;
  ">

    <a href="https://github.com/kter2021/janken-yuriana"
       target="_blank"
       style="color:#aaa;">

      GitHub / Credits

    </a>

    <br>

    Unofficial fan-made game / Adult content / AI-generated assets included

  </div>

</body>

</html>
